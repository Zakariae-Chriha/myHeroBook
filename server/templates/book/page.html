<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <!--
    Reference template — actual rendering is done via pdfService.js

    Variables replaced at runtime:
      {{imageUrl}}    — Cloudinary URL of the AI-generated illustration
      {{text}}        — Story text for this page
      {{pageNumber}}  — Page number (1–32)
      {{qrCodeUrl}}   — Cloudinary URL of QR code (voice tier only, omit block if absent)
  -->
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@500;700&display=swap" rel="stylesheet" />
  <style>
    @page { size: 8.5in 8.5in; margin: 0; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 8.5in; height: 8.5in;
      background: #FEFCF5;
      display: flex; flex-direction: column;
      -webkit-print-color-adjust: exact; print-color-adjust: exact;
      overflow: hidden;
    }
    .illustration { flex: 0 0 58%; overflow: hidden; }
    .illustration img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .divider { height: 3px; flex-shrink: 0; background: linear-gradient(90deg, transparent, rgba(201,168,76,0.45) 30%, rgba(201,168,76,0.45) 70%, transparent); }
    .text-area { flex: 1; padding: 0.26in 0.42in 0.2in; display: flex; flex-direction: column; justify-content: space-between; }
    .text { font-family: 'Nunito', Arial, sans-serif; font-size: 13.5pt; font-weight: 500; line-height: 1.68; color: #1E2030; }
    .footer { display: flex; align-items: center; justify-content: space-between; margin-top: 0.1in; }
    .page-num { font-family: 'Nunito', Arial, sans-serif; font-size: 9pt; color: rgba(107,122,153,0.65); letter-spacing: 0.05em; }
    .qr { display: flex; align-items: center; gap: 6px; }
    .qr span { font-size: 8pt; color: rgba(107,122,153,0.6); }
    .qr img { width: 0.52in; height: 0.52in; }
  </style>
</head>
<body>
  <div class="illustration"><img src="{{imageUrl}}" alt="Page {{pageNumber}}" /></div>
  <div class="divider"></div>
  <div class="text-area">
    <p class="text">{{text}}</p>
    <div class="footer">
      <span class="page-num">— {{pageNumber}} —</span>
      <div class="qr">
        <span>🎧 Hear this page</span>
        <img src="{{qrCodeUrl}}" alt="QR" />
      </div>
    </div>
  </div>
</body>
</html>
