<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <!--
    Reference template — actual rendering is done via pdfService.js
    which builds this layout dynamically using template literal functions.

    Variables replaced at runtime:
      {{title}}           — book title
      {{childName}}       — child's first name
      {{coverImageUrl}}   — Cloudinary URL of page 1 illustration
      {{episodeBadge}}    — "Episode N · " prefix or empty string
      {{dedication}}      — optional dedication text (block omitted if absent)
  -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Nunito:wght@700&display=swap" rel="stylesheet" />
  <style>
    @page { size: 8.5in 8.5in; margin: 0; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 8.5in; height: 8.5in;
      background: linear-gradient(160deg, #0D1220 0%, #141929 55%, #0A0E1A 100%);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 0.45in;
      font-family: 'Playfair Display', Georgia, serif;
      -webkit-print-color-adjust: exact; print-color-adjust: exact;
    }
    .border { position: absolute; inset: 0.22in; border: 2.5px solid rgba(201,168,76,0.38); border-radius: 14px; }
    .badge { font-family: 'Nunito', Arial, sans-serif; font-size: 10.5pt; font-weight: 700; letter-spacing: 0.16em; text-transform: uppercase; color: rgba(201,168,76,0.85); margin-bottom: 0.22in; }
    .image-frame { width: 3.4in; height: 3.4in; border-radius: 14px; overflow: hidden; border: 4px solid rgba(201,168,76,0.55); box-shadow: 0 0 48px rgba(201,168,76,0.28); margin-bottom: 0.28in; }
    .image-frame img { width: 100%; height: 100%; object-fit: cover; display: block; }
    h1 { font-size: 26pt; font-weight: 900; color: #C9A84C; text-align: center; line-height: 1.22; margin-bottom: 0.14in; max-width: 6.5in; }
    .child-name { font-family: 'Nunito', Arial, sans-serif; font-size: 13pt; color: rgba(245,237,214,0.85); }
    .child-name span { color: #C9A84C; font-weight: 700; }
    .dedication { font-family: 'Nunito', Arial, sans-serif; font-style: italic; font-size: 9.5pt; color: rgba(245,237,214,0.55); margin-top: 0.28in; text-align: center; max-width: 5.2in; line-height: 1.65; }
    .footer { position: absolute; bottom: 0.4in; font-family: 'Nunito', Arial, sans-serif; font-size: 8pt; letter-spacing: 0.08em; color: rgba(201,168,76,0.4); text-transform: uppercase; }
  </style>
</head>
<body>
  <div class="border"></div>
  <div class="badge">✦ {{episodeBadge}}Hero Universe ✦</div>
  <div class="image-frame"><img src="{{coverImageUrl}}" alt="Cover" /></div>
  <h1>{{title}}</h1>
  <p class="child-name">A story for <span>{{childName}}</span></p>
  <p class="dedication">"{{dedication}}"</p>
  <div class="footer">The Hero Kids StoryLab · herokidsstorylab.com</div>
</body>
</html>
