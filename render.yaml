services:
  - type: web
    name: hero-kids-storylab-api
    runtime: node
    buildCommand: cd server && npm install --omit=dev
    startCommand: cd server && node server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      # ── Set all other variables in the Render dashboard ──
      # MONGODB_URI
      # JWT_ACCESS_SECRET
      # JWT_REFRESH_SECRET
      # JWT_ACCESS_EXPIRES_IN
      # JWT_REFRESH_EXPIRES_IN
      # REDIS_HOST / REDIS_PORT / REDIS_PASSWORD / REDIS_TLS
      # CLOUDINARY_CLOUD_NAME / CLOUDINARY_API_KEY / CLOUDINARY_API_SECRET
      # CLOUDINARY_FOLDER_PHOTOS / CLOUDINARY_FOLDER_ILLUSTRATIONS
      # GEMINI_API_KEY / GEMINI_MODEL
      # GROQ_API_KEY / GROQ_MODEL
      # REPLICATE_API_TOKEN
      # HUGGINGFACE_API_TOKEN
      # ELEVENLABS_API_KEY / ELEVENLABS_MODEL_ID
      # STRIPE_SECRET_KEY / STRIPE_WEBHOOK_SECRET
      # STRIPE_PRICE_DIGITAL / STRIPE_PRICE_PRINTED / STRIPE_PRICE_VOICE
      # GMAIL_USER / GMAIL_APP_PASSWORD / EMAIL_FROM / EMAIL_FROM_NAME
      # BCRYPT_ROUNDS
      # ADMIN_EMAILS
      # ALLOWED_ORIGINS  (your Vercel URL, e.g. https://my-hero-book.vercel.app)
